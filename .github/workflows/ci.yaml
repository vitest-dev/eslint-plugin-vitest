name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Install
        run: pnpm install

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint code
        run: pnpm lint:js

      - name: Lint docs
        run: pnpm lint:eslint-docs

  test:
    name: Test (Node.js ${{ matrix.node-version }}, ${{ matrix.os.name }})
    runs-on: ${{ matrix.os.version }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24
        os:
          - name: Ubuntu
            version: ubuntu-latest
          - name: Windows
            version: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        name: Install pnpm
        with:
          version: 10
          cache: true
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: pnpm install

      - name: Test
        run: pnpm test
